---
# Blackbox Exporter for Prometheus
# Performs HTTP, TCP, ICMP probes for endpoint monitoring
apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
  namespace: monitoring
data:
  blackbox.yml: |
    modules:
      # HTTP probe - check for 2xx response
      http_2xx:
        prober: http
        timeout: 10s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []  # Defaults to 2xx
          method: GET
          follow_redirects: true
          fail_if_ssl: false
          fail_if_not_ssl: false
          tls_config:
            insecure_skip_verify: true

      # HTTP probe - check for 2xx with SSL verification
      http_2xx_ssl:
        prober: http
        timeout: 10s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []
          method: GET
          follow_redirects: true
          fail_if_ssl: false
          fail_if_not_ssl: true
          tls_config:
            insecure_skip_verify: false

      # HTTP POST probe
      http_post_2xx:
        prober: http
        timeout: 10s
        http:
          method: POST
          valid_status_codes: []

      # TCP connection probe
      tcp_connect:
        prober: tcp
        timeout: 10s
        tcp:
          preferred_ip_protocol: ip4

      # TCP with TLS
      tcp_connect_tls:
        prober: tcp
        timeout: 10s
        tcp:
          preferred_ip_protocol: ip4
          tls: true
          tls_config:
            insecure_skip_verify: true

      # ICMP ping probe
      icmp:
        prober: icmp
        timeout: 5s
        icmp:
          preferred_ip_protocol: ip4

      # DNS probe
      dns_udp:
        prober: dns
        timeout: 5s
        dns:
          query_name: "google.com"
          query_type: "A"
          transport_protocol: udp
          preferred_ip_protocol: ip4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: monitoring
  labels:
    app: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: blackbox-exporter
          image: prom/blackbox-exporter:v0.25.0
          ports:
            - containerPort: 9115
              name: http
              protocol: TCP
          args:
            - --config.file=/etc/blackbox_exporter/blackbox.yml
            - --log.level=info
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox_exporter
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 64Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /health
              port: 9115
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9115
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter-config
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: monitoring
  labels:
    app: blackbox-exporter
spec:
  selector:
    matchLabels:
      app: blackbox-exporter
  ports:
    - port: 9115
      targetPort: 9115
      name: http
  type: ClusterIP
---
# ServiceMonitor for Prometheus Operator auto-discovery
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: blackbox-exporter
  namespace: monitoring
  labels:
    app: blackbox-exporter
    release: prometheus
spec:
  selector:
    matchLabels:
      app: blackbox-exporter
  endpoints:
    - port: http
      interval: 30s
      path: /metrics

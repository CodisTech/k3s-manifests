# =============================================================================
# Deployment Commands
# =============================================================================
#
# On Pi-hole:
#   sudo nano /etc/promtail/config.yml
#   # Paste the Pi-hole config above
#   sudo systemctl restart promtail
#   sudo systemctl status promtail
#   # Verify TLS connection
#   curl -v https://loki.home.example.home/ready
#
# On VM 111:
#   sudo nano /etc/promtail/config.yml
#   # Paste the VM 111 config above
#   sudo systemctl restart promtail
#   sudo systemctl status promtail
#   # Verify TLS connection
#   curl -v https://loki.home.example.home/ready
#
# Verify logs are arriving in Grafana:
#   Query: {host="pihole"}
#   Query: {host="vm111"}

# External Promtail Configuration with TLS
# Apply this config to Promtail instances running outside the k3s cluster
#
# Locations:
#   - Pi-hole (10.0.60.55): /etc/promtail/config.yml
#   - VM 111 (10.0.70.10): /etc/promtail/config.yml
#
# After updating, restart Promtail:
#   sudo systemctl restart promtail

# =============================================================================
# Pi-hole Promtail Config (/etc/promtail/config.yml)
# =============================================================================
# server:
#   http_listen_port: 9080
#   grpc_listen_port: 0
#
# positions:
#   filename: /var/lib/promtail/positions.yaml
#
# clients:
#   - url: https://loki.home.example.home/loki/api/v1/push
#     # TLS is handled by the server certificate (Let's Encrypt)
#     # No client cert needed for push
#     tls_config:
#       insecure_skip_verify: false
#     # Optional: Add tenant ID for multi-tenancy
#     # tenant_id: pihole
#
# scrape_configs:
#   - job_name: pihole
#     static_configs:
#       - targets:
#           - localhost
#         labels:
#           job: pihole
#           host: pihole
#           __path__: /var/log/pihole/*.log
#
#   - job_name: pihole-ftl
#     static_configs:
#       - targets:
#           - localhost
#         labels:
#           job: pihole-ftl
#           host: pihole
#           __path__: /var/log/pihole-FTL.log
#
#   - job_name: dnsmasq
#     static_configs:
#       - targets:
#           - localhost
#         labels:
#           job: dnsmasq
#           host: pihole
#           __path__: /var/log/dnsmasq.log


---
apiVersion: v1
kind: Namespace
metadata:
  name: jellystat
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellystat-db-longhorn
  namespace: jellystat
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# Secret is now managed by ExternalSecret (jellystat-externalsecret.yaml)
# Pulls from HashiCorp Vault: secret/jellystat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellystat-db-longhorn
  namespace: jellystat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellystat-db
  template:
    metadata:
      labels:
        app: jellystat-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "jellystat"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jellystat-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "jellystat"
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: jellystat-db-longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: jellystat-db-longhorn
  namespace: jellystat
spec:
  selector:
    app: jellystat-db
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellystat
  namespace: jellystat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellystat
  template:
    metadata:
      labels:
        app: jellystat
    spec:
      containers:
      - name: jellystat
        image: cyfershepard/jellystat:latest
        ports:
        - containerPort: 3000
        env:
        - name: POSTGRES_USER
          value: "jellystat"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jellystat-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_IP
          value: "jellystat-db"
        - name: POSTGRES_PORT
          value: "5432"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jellystat-secrets
              key: JWT_SECRET
        - name: TZ
          value: "America/New_York"
---
apiVersion: v1
kind: Service
metadata:
  name: jellystat
  namespace: jellystat
spec:
  selector:
    app: jellystat
  ports:
  - port: 80
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellystat-ingress
  namespace: jellystat
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - jellystat.home.example.home
    secretName: jellystat-tls
  rules:
  - host: jellystat.home.example.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jellystat
            port:
              number: 80

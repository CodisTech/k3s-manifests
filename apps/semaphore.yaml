---
apiVersion: v1
kind: Namespace
metadata:
  name: semaphore
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: semaphore-db-longhorn
  namespace: semaphore
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
# Secret is managed by ExternalSecret (semaphore-externalsecret.yaml)
# Pulls from HashiCorp Vault: secret/semaphore
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semaphore-db-longhorn
  namespace: semaphore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semaphore-db
  template:
    metadata:
      labels:
        app: semaphore-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "semaphore"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: semaphore-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "semaphore"
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: semaphore-db-longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: semaphore-db-longhorn
  namespace: semaphore
spec:
  selector:
    app: semaphore-db
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: semaphore-work-longhorn
  namespace: semaphore
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semaphore
  namespace: semaphore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semaphore
  template:
    metadata:
      labels:
        app: semaphore
    spec:
      containers:
      - name: semaphore
        image: semaphoreui/semaphore:latest
        ports:
        - containerPort: 3000
        env:
        - name: SEMAPHORE_DB_DIALECT
          value: "postgres"
        - name: SEMAPHORE_DB_HOST
          value: "semaphore-db"
        - name: SEMAPHORE_DB_PORT
          value: "5432"
        - name: SEMAPHORE_DB_USER
          value: "semaphore"
        - name: SEMAPHORE_DB_PASS
          valueFrom:
            secretKeyRef:
              name: semaphore-secrets
              key: SEMAPHORE_DB_PASS
        - name: SEMAPHORE_DB
          value: "semaphore"
        - name: SEMAPHORE_ADMIN
          valueFrom:
            secretKeyRef:
              name: semaphore-secrets
              key: SEMAPHORE_ADMIN
        - name: SEMAPHORE_ADMIN_NAME
          valueFrom:
            secretKeyRef:
              name: semaphore-secrets
              key: SEMAPHORE_ADMIN_NAME
        - name: SEMAPHORE_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: semaphore-secrets
              key: SEMAPHORE_ADMIN_PASSWORD
        - name: SEMAPHORE_ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: semaphore-secrets
              key: SEMAPHORE_ADMIN_EMAIL
        - name: SEMAPHORE_ACCESS_KEY_ENCRYPTION
          valueFrom:
            secretKeyRef:
              name: semaphore-secrets
              key: SEMAPHORE_ACCESS_KEY_ENCRYPTION
        - name: SEMAPHORE_WEB_ROOT
          value: "https://semaphore.home.example.home"
        - name: TZ
          value: "America/New_York"
        volumeMounts:
        - name: work-dir
          mountPath: /tmp/semaphore
      volumes:
      - name: work-dir
        persistentVolumeClaim:
          claimName: semaphore-work-longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: semaphore-web
  namespace: semaphore
spec:
  selector:
    app: semaphore
  ports:
  - port: 80
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: semaphore-ingress
  namespace: semaphore
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - semaphore.home.example.home
    secretName: semaphore-tls
  rules:
  - host: semaphore.home.example.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: semaphore-web
            port:
              number: 80

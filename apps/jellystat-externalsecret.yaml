---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellystat-secrets
  namespace: jellystat
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: jellystat-secrets  # K8s secret name that will be created
    creationPolicy: Owner
  data:
  - secretKey: POSTGRES_PASSWORD  # Key in the K8s secret
    remoteRef:
      key: jellystat              # Path in Vault (under secret/)
      property: postgres_password  # Key in Vault secret
  - secretKey: JWT_SECRET
    remoteRef:
      key: jellystat
      property: jwt_secret

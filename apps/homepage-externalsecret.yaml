---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secrets
  namespace: homepage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: homepage-secrets
    creationPolicy: Owner
  data:
  # Proxmox API tokens (username = user@pam!tokenid, secret = uuid)
  - secretKey: PROXMOX_A_TOKEN
    remoteRef:
      key: homepage
      property: proxmox_a_token
  - secretKey: PROXMOX_A_SECRET
    remoteRef:
      key: homepage
      property: proxmox_a_secret
  - secretKey: PROXMOX_C_TOKEN
    remoteRef:
      key: homepage
      property: proxmox_c_token
  - secretKey: PROXMOX_C_SECRET
    remoteRef:
      key: homepage
      property: proxmox_c_secret
  - secretKey: PROXMOX_D_TOKEN
    remoteRef:
      key: homepage
      property: proxmox_d_token
  - secretKey: PROXMOX_D_SECRET
    remoteRef:
      key: homepage
      property: proxmox_d_secret
  # Pi-hole API keys
  - secretKey: PIHOLE_1_KEY
    remoteRef:
      key: homepage
      property: pihole_1_key
  - secretKey: PIHOLE_2_KEY
    remoteRef:
      key: homepage
      property: pihole_2_key
  # Portainer API key
  - secretKey: PORTAINER_KEY
    remoteRef:
      key: homepage
      property: portainer_key
  # Grafana API key
  - secretKey: GRAFANA_KEY
    remoteRef:
      key: homepage
      property: grafana_key
  # Authentik API key
  - secretKey: AUTHENTIK_KEY
    remoteRef:
      key: homepage
      property: authentik_key
  # Media - Plex
  - secretKey: PLEX_KEY
    remoteRef:
      key: homepage
      property: plex_key
  # Media - Jellyfin
  - secretKey: JELLYFIN_KEY
    remoteRef:
      key: homepage
      property: jellyfin_key
  # Media - Tautulli
  - secretKey: TAUTULLI_KEY
    remoteRef:
      key: homepage
      property: tautulli_key
  # Media - Radarr
  - secretKey: RADARR_KEY
    remoteRef:
      key: homepage
      property: radarr_key
  # Media - Sonarr
  - secretKey: SONARR_KEY
    remoteRef:
      key: homepage
      property: sonarr_key
  # Media - Prowlarr
  - secretKey: PROWLARR_KEY
    remoteRef:
      key: homepage
      property: prowlarr_key
  # Media - Jellyseerr
  - secretKey: JELLYSEERR_KEY
    remoteRef:
      key: homepage
      property: jellyseerr_key
  # Media - qBittorrent
  - secretKey: QBITTORRENT_USER
    remoteRef:
      key: homepage
      property: qbittorrent_user
  - secretKey: QBITTORRENT_PASS
    remoteRef:
      key: homepage
      property: qbittorrent_pass
  # Home Assistant
  - secretKey: HASS_KEY
    remoteRef:
      key: homepage
      property: hass_key
  # UniFi
  - secretKey: UNIFI_USER
    remoteRef:
      key: homepage
      property: unifi_user
  - secretKey: UNIFI_PASS
    remoteRef:
      key: homepage
      property: unifi_pass
  # Nextcloud
  - secretKey: NEXTCLOUD_USER
    remoteRef:
      key: homepage
      property: nextcloud_user
  - secretKey: NEXTCLOUD_PASS
    remoteRef:
      key: homepage
      property: nextcloud_pass
  # Healthchecks.io (read-only API key)
  - secretKey: HEALTHCHECKS_KEY
    remoteRef:
      key: homepage
      property: healthchecks_key

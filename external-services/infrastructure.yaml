---
# External Services - Infrastructure
# Purpose: Route traffic from k3s Traefik to infrastructure services
# These are not Docker containers - they're VMs and physical devices
---
# Home Assistant (VM 113 - 10.0.60.100)
apiVersion: v1
kind: Endpoints
metadata:
  name: homeassistant
  namespace: external
subsets:
  - addresses:
      - ip: 10.0.60.100
    ports:
      - name: http
        port: 8123
        protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: homeassistant
  namespace: external
spec:
  ports:
    - name: http
      port: 8123
      targetPort: 8123
  clusterIP: None
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeassistant-external
  namespace: external
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ha.local.example.home
      secretName: ha-local-tls
  rules:
    - host: ha.local.example.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homeassistant
                port:
                  number: 8123
---

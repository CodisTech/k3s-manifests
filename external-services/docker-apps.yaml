---
# External Services - Docker Apps (VM 100 - 10.0.60.11)
# Purpose: Route traffic from k3s Traefik to Docker Traefik
#
# Architecture:
#   Browser → k3s Traefik (10.0.60.31) → Docker Traefik (10.0.60.11:443) → Container
#
# k3s Traefik terminates TLS with Let's Encrypt certs, then forwards to
# Docker Traefik via HTTPS. Docker Traefik routes based on Host header.
#
# After migration: Delete the external ingress, deploy k3s version
#
# DNS Requirement: *.local.example.home → 10.0.60.31 (k3s Traefik)
---
apiVersion: v1
kind: Namespace
metadata:
  name: external
  labels:
    app.kubernetes.io/part-of: homelab
---
# Endpoints for Docker Traefik (10.0.60.11)
apiVersion: v1
kind: Endpoints
metadata:
  name: docker-traefik
  namespace: external
subsets:
  - addresses:
      - ip: 10.0.60.11
    ports:
      - name: https
        port: 443
        protocol: TCP
---
# Service pointing to Docker Traefik
apiVersion: v1
kind: Service
metadata:
  name: docker-traefik
  namespace: external
spec:
  ports:
    - name: https
      port: 443
      targetPort: 443
  clusterIP: None
---
# n8n
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n-external
  namespace: external
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: https
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - n8n.local.example.home
      secretName: n8n-local-tls
  rules:
    - host: n8n.local.example.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docker-traefik
                port:
                  number: 443

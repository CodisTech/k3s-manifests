---
apiVersion: v1
kind: Namespace
metadata:
  name: external-services
---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-server-a
  namespace: external-services
spec:
  type: ClusterIP
  ports:
  - port: 8006
    targetPort: 8006
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-server-a
  namespace: external-services
subsets:
- addresses:
  - ip: 10.0.60.10
  ports:
  - port: 8006
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: proxmox-transport
  namespace: external-services
spec:
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox-server-a
  namespace: external-services
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`proxmox-a.home.example.home`)
    kind: Rule
    services:
    - name: proxmox-server-a
      port: 8006
      serversTransport: proxmox-transport
      scheme: https
  tls:
    secretName: proxmox-a-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: proxmox-a-tls
  namespace: external-services
spec:
  secretName: proxmox-a-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
  - proxmox-a.home.example.home

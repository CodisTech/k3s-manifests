# CrowdSec Traefik Bouncer Middleware
# Applied globally via Traefik entrypoint args
# Bouncer API key generated with: cscli bouncers add traefik-k3s-bouncer -o raw
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec-bouncer
  namespace: traefik
spec:
  plugin:
    crowdsec-bouncer:
      crowdsecLapiScheme: http
      crowdsecLapiHost: crowdsec-service.crowdsec.svc.cluster.local:8080
      crowdsecLapiKey: UJPSUsB61H6hwY4lnplrPcjwLy9dpXPlQ2Sae/dxoeo
      updateIntervalSeconds: 15
      defaultDecisionSeconds: 60
      crowdsecMode: stream
      forwardedHeadersTrustedIPs:
        - 10.42.0.0/16
        - 10.43.0.0/16
        - 172.16.0.0/12
      clientTrustedIPs:
        - 10.0.60.0/24

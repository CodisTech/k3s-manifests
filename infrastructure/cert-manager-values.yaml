# cert-manager Helm values
# Migrated 2026-05-02 from raw kubectl (v1.14.4) to Helm chart v1.14.7
# Upgraded 2026-05-02 to v1.18.6 (CRDs applied separately from upstream YAML)
# Upgrade: helm upgrade cert-manager jetstack/cert-manager -n cert-manager --version <X> -f cert-manager-values.yaml
# Repo: helm repo add jetstack https://charts.jetstack.io

# CRDs are managed outside Helm — never let helm uninstall drop them
installCRDs: false

# Match existing controller args
extraArgs:
  - --max-concurrent-challenges=60

# HA: 2 reps each, spread one-per-worker
replicaCount: 2
podDnsPolicy: ClusterFirst

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: cert-manager
        app.kubernetes.io/component: controller

# Existing Prometheus scrape annotations
prometheus:
  enabled: true
  servicemonitor:
    enabled: false

webhook:
  replicaCount: 2
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/instance: cert-manager
          app.kubernetes.io/component: webhook

cainjector:
  replicaCount: 2
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/instance: cert-manager
          app.kubernetes.io/component: cainjector
